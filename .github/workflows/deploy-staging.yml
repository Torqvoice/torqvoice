name: "Deploy: Staging"

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to deploy (e.g. latest, v1.3.0, dev-abc1234)"
        required: false
        default: "latest"

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64, hetzner]

    steps:
      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Create deployment files
        env:
          VIRTUAL_HOST: ${{ secrets.STAGING_VIRTUAL_HOST }}
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.STAGING_BETTER_AUTH_SECRET }}
          APP_URL: ${{ secrets.STAGING_APP_URL }}
          STRIPE_SECRET_KEY: ${{ secrets.STAGING_STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STAGING_STRIPE_WEBHOOK_SECRET }}
          STRIPE_PRO_PRICE_ID: ${{ secrets.STAGING_STRIPE_PRO_PRICE_ID }}
          STRIPE_ENTERPRISE_PRICE_ID: ${{ secrets.STAGING_STRIPE_ENTERPRISE_PRICE_ID }}
          DATA_PATH: ${{ secrets.DATA_PATH }}
        run: |
          mkdir -p /tmp/torqvoice-staging
          cd /tmp/torqvoice-staging

          env | grep -E '^(VIRTUAL_HOST|DATA_PATH|DATABASE_URL|BETTER_AUTH_SECRET|APP_URL|STRIPE_)' > .env

          cat > docker-compose.yml << 'COMPOSE'
          networks:
            proxy:
              external: true
              name: proxy
          services:
            torqvoice-staging:
              container_name: torqvoice-staging
              image: ghcr.io/torqvoice/torqvoice:${APP_TAG:-latest}
              restart: unless-stopped
              volumes:
                - ${DATA_PATH}/torqvoice_staging_data:/app/data
              expose:
                - "3000"
              environment:
                VIRTUAL_HOST: ${VIRTUAL_HOST}
                VIRTUAL_PORT: "3000"
                LETSENCRYPT_HOST: ${VIRTUAL_HOST}
                DATABASE_URL: ${DATABASE_URL}
                BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
                NEXT_PUBLIC_APP_URL: ${APP_URL}
                TORQVOICE_MODE: cloud
                STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
                STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
                STRIPE_PRO_PRICE_ID: ${STRIPE_PRO_PRICE_ID}
                STRIPE_ENTERPRISE_PRICE_ID: ${STRIPE_ENTERPRISE_PRICE_ID}
              networks:
                - proxy
          COMPOSE

      - name: Deploy staging
        run: |
          cd /tmp/torqvoice-staging
          TAG=${{ inputs.tag || 'latest' }}
          APP_TAG=$TAG docker compose up -d --pull always

      - name: Health check
        run: |
          echo "Waiting for staging to be ready..."
          for i in $(seq 1 30); do
            if curl -sf "${{ secrets.STAGING_APP_URL }}" > /dev/null 2>&1; then
              echo "Staging is healthy!"
              exit 0
            fi
            sleep 5
          done
          echo "::warning::Staging health check timed out after 150s"

      - name: Prune old images and build cache
        run: docker image prune -f && docker builder prune -f
